
services:
  web:
    build: ./src
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./src/:/usr/src/app/
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://app:app@db/web_fastapi_dev
  db:
    image: postgres:18.3-alpine3.23
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=web_fastapi_dev

    
volumes:
  postgres_data: